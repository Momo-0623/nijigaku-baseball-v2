<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>虹学夏季野球大会｜運営</title>
<style>
:root{--navy:#05284d;--red:#c91f28;--line:#d9dee6;--green:#17844d;--bg:#f4f6f8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:#15202b}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px}header img{width:34px;height:34px;object-fit:contain}header b{font-size:20px}
nav{display:flex;gap:8px;padding:12px;overflow:auto;background:#fff;border-bottom:1px solid var(--line)}nav button,.btn{border:0;border-radius:8px;padding:11px 16px;font-weight:700;cursor:pointer}.tab{background:#e8edf3;color:#18324b}.tab.active,.primary{background:var(--red);color:#fff}.secondary{background:var(--navy);color:#fff}
main{max-width:1180px;margin:auto;padding:16px}.page{display:none}.page.active{display:block}.grid{display:grid;grid-template-columns:280px minmax(320px,1fr) 280px;gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 2px 8px #0000000a}.card h2,.card h3{margin-top:0}
select,input,textarea{width:100%;padding:11px;border:1px solid #cbd3dd;border-radius:8px;font:inherit;margin:6px 0 10px}textarea{min-height:180px}
.teamline{display:flex;align-items:center;gap:10px;font-weight:700}.teamline img,.logo{width:42px;height:42px;object-fit:contain}
.wheelwrap{display:grid;place-items:center}.wheel{position:relative;width:min(360px,80vw);aspect-ratio:1;border-radius:50%;background:conic-gradient(#c91f28 0deg 60deg,#3c4147 60deg 120deg,#555 120deg 180deg,#16864d 180deg 240deg,#1762b0 240deg 300deg,#ed9411 300deg 360deg);border:8px solid #fff;box-shadow:0 0 0 2px #ccd3dc,0 8px 20px #0002;transition:transform 2.2s cubic-bezier(.1,.7,.1,1);overflow:hidden}
.wheel-label{position:absolute;left:50%;top:50%;width:42%;text-align:center;color:#fff;font-weight:800;font-size:16px;line-height:1.15;text-shadow:0 1px 3px #0009;transform-origin:0 0;z-index:1}
.wheel img{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:26%;height:26%;object-fit:contain;background:white;border-radius:50%;padding:4px;z-index:3}.pointer{font-size:34px;color:var(--red);margin-bottom:-12px;z-index:4}
.result{text-align:center}.result strong{font-size:30px;color:var(--red)}.score{font-size:34px;font-weight:800;color:var(--red)}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}th{background:#f5f7fa}.actions{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:13px;color:#5d6975}.ok{color:var(--green);font-weight:700}.warn{color:var(--red);font-weight:700}
@media(max-width:850px){.grid{grid-template-columns:1fr}.wheel{width:min(330px,78vw)}.wheel-label{font-size:14px}header b{font-size:17px}#teamRows .teamline{display:grid;grid-template-columns:56px minmax(0,1fr);gap:10px;align-items:center}#teamRows .teamline>img{grid-column:1;grid-row:1;width:48px;height:48px}#teamRows .teamline>input[type="text"],#teamRows .teamline>input:not([type]){grid-column:2;grid-row:1;min-width:0;margin:0}#teamRows .teamline>input[type="file"]{grid-column:1 / -1;grid-row:2;width:100%;min-width:0;margin:4px 0 0}#teamRows .teamline>button{grid-column:1 / -1;grid-row:3;width:100%;padding:10px;border:0;border-radius:8px}}
</style></head><body>
<header><img src="assets/baseball.png" alt=""><b>虹学夏季野球大会</b></header>
<nav><button class="tab active" data-page="bat">打席</button><button class="tab" data-page="rank">ランキング</button><button class="tab" data-page="students">生徒管理</button><button class="tab" data-page="teams">チーム管理</button><button class="tab" data-page="settings">設定</button></nav>
<main>
<section id="bat" class="page active"><div class="grid"><div class="card"><h3>打者を選択</h3><select id="batter"></select><div id="batterTeam" class="teamline"></div><hr><h3>本日の打席状況</h3><div id="todayStatus"></div></div>
<div class="card wheelwrap"><div class="pointer">▼</div><div id="wheel" class="wheel"><span class="wheel-label" style="transform:rotate(30deg) translate(19%,-50%) rotate(-30deg)">三振</span><span class="wheel-label" style="transform:rotate(90deg) translate(19%,-50%) rotate(-90deg)">アウト</span><span class="wheel-label" style="transform:rotate(150deg) translate(19%,-50%) rotate(-150deg)">ヒット</span><span class="wheel-label" style="transform:rotate(210deg) translate(19%,-50%) rotate(-210deg)">二塁打</span><span class="wheel-label" style="transform:rotate(270deg) translate(19%,-50%) rotate(-270deg)">三塁打</span><span class="wheel-label" style="transform:rotate(330deg) translate(19%,-50%) rotate(-330deg)">ホームラン</span><img src="assets/baseball.png" alt=""></div><button id="spin" class="btn primary">ルーレットを回す</button></div>
<div class="card result"><h3>結果</h3><strong id="resultName">―</strong><div id="resultScore" class="score"></div><p id="totals"></p></div></div>
<div class="card" style="margin-top:16px"><h3>コピー用メッセージ</h3><textarea id="message" readonly></textarea><button id="copy" class="btn secondary">結果をコピー</button></div></section>
<section id="rank" class="page"><div class="card"><h2>チームランキング</h2><table><thead><tr><th>順位</th><th>チーム</th><th>得点</th></tr></thead><tbody id="teamRank"></tbody></table></div><div class="card" style="margin-top:16px"><h2>個人ランキング</h2><table><thead><tr><th>順位</th><th>名前</th><th>所属</th><th>得点</th></tr></thead><tbody id="playerRank"></tbody></table></div></section>
<section id="students" class="page"><div class="card"><h2>生徒管理</h2><div class="actions"><input id="studentName" placeholder="生徒名" style="flex:1;min-width:180px"><select id="studentTeam" style="flex:1;min-width:180px"></select><button id="addStudent" class="btn secondary">生徒を追加</button></div><table><thead><tr><th>名前</th><th>所属</th><th>得点</th><th>今日</th><th></th></tr></thead><tbody id="studentRows"></tbody></table></div></section>
<section id="teams" class="page"><div class="card"><h2>チーム管理</h2><p class="small">ロゴは画像ファイルを選択するとブラウザ内へ保存されます。</p><div class="actions"><input id="teamName" placeholder="チーム名" style="flex:1;min-width:180px"><button id="addTeam" class="btn secondary">チームを追加</button></div><div id="teamRows"></div></div></section>
<section id="settings" class="page"><div class="card"><h2>設定</h2><p class="small">結果の確率は固定初期値です：三振20%、アウト25%、ヒット25%、二塁打15%、三塁打5%、ホームラン10%。得点は 0 / 0 / 1 / 2 / 3 / 5pt。</p><button id="resetToday" class="btn secondary">本日の挑戦履歴だけリセット</button> <button id="resetAll" class="btn primary">全データ初期化</button></div></section>
</main><script>
const KEY='nijigakuBaseballV1'; const placeholder='assets/team-placeholder.png';
const outcomes=[{name:'三振',p:20,pt:0,msg:['空振り三振！バットが空を切った！','最後の一球を捉えきれず、三振！']},{name:'アウト',p:25,pt:0,msg:['打球は守備の正面へ。アウト！','惜しい当たりも、ここはアウト！']},{name:'ヒット',p:25,pt:1,msg:['鋭い打球が野手の間を抜けた！','綺麗に運んだ一打、ヒット！']},{name:'二塁打',p:15,pt:2,msg:['打球は外野を抜け、一気に二塁へ！','長打コース！悠々と二塁到達！']},{name:'三塁打',p:5,pt:3,msg:['快足を飛ばして三塁へ！三塁打！','外野を深々と破る一打！三塁まで到達！']},{name:'ホームラン',p:10,pt:5,msg:['綺麗な放物線を描いた打球は、そのままスタンドへ！','高く舞い上がった打球はフェンスの向こうへ！']}];
let db=load(),lastResult=null; function seed(){return {teams:[{id:crypto.randomUUID(),name:'TEAM A',logo:placeholder,score:0},{id:crypto.randomUUID(),name:'TEAM B',logo:placeholder,score:0},{id:crypto.randomUUID(),name:'TEAM C',logo:placeholder,score:0}],students:[],history:[]}} function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch{return seed()}} function save(){localStorage.setItem(KEY,JSON.stringify(db));renderAll()} const today=()=>new Intl.DateTimeFormat('sv-SE',{timeZone:'Asia/Tokyo'}).format(new Date()); const team=id=>db.teams.find(t=>t.id===id); const played=s=>s.lastPlayed===today(); function pick(){let n=Math.random()*100,sum=0;for(const o of outcomes){sum+=o.p;if(n<sum)return o}return outcomes.at(-1)} function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.page).classList.add('active');renderAll()});
function renderAll(){const batter=document.getElementById('batter'),old=batter.value;batter.innerHTML='<option value="">生徒を選択してください</option>'+db.students.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');if(db.students.some(s=>s.id===old))batter.value=old;renderBatter();studentTeam.innerHTML=db.teams.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');studentRows.innerHTML=db.students.map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(team(s.teamId)?.name||'未所属')}</td><td>${s.score||0}pt</td><td>${played(s)?'打席済み':'未打席'}</td><td><button onclick="delStudent('${s.id}')">削除</button></td></tr>`).join('');teamRows.innerHTML=db.teams.map(t=>`<div class="card" style="margin:10px 0"><div class="teamline"><img src="${t.logo||placeholder}"><input value="${esc(t.name)}" onchange="renameTeam('${t.id}',this.value)"><input type="file" accept="image/*" onchange="logoTeam('${t.id}',this.files[0])"><button onclick="delTeam('${t.id}')">削除</button></div></div>`).join('');let tr=[...db.teams].sort((a,b)=>b.score-a.score);teamRank.innerHTML=tr.map((t,i)=>`<tr><td>${i+1}</td><td><span class="teamline"><img class="logo" src="${t.logo||placeholder}">${esc(t.name)}</span></td><td>${t.score}pt</td></tr>`).join('');let pr=[...db.students].sort((a,b)=>b.score-a.score);playerRank.innerHTML=pr.map((s,i)=>`<tr><td>${i+1}</td><td>${esc(s.name)}</td><td>${esc(team(s.teamId)?.name||'未所属')}</td><td>${s.score||0}pt</td></tr>`).join('')}
function renderBatter(){let s=db.students.find(x=>x.id===batter.value);if(!s){batterTeam.innerHTML='';todayStatus.innerHTML='生徒を選択してください';spin.disabled=true;return}let t=team(s.teamId);batterTeam.innerHTML=`<img src="${t?.logo||placeholder}">${esc(t?.name||'未所属')}`;todayStatus.innerHTML=played(s)?'<span class="warn">本日は打席済みです</span>':'<span class="ok">本日はまだ打席に立っていません</span>';spin.disabled=played(s)} batter.onchange=renderBatter;
spin.onclick=()=>{let s=db.students.find(x=>x.id===batter.value);if(!s||played(s))return;spin.disabled=true;let o=pick(),rot=1440+Math.floor(Math.random()*360);wheel.style.transform=`rotate(${rot}deg)`;setTimeout(()=>{let t=team(s.teamId);s.score=(s.score||0)+o.pt;s.lastPlayed=today();if(t)t.score=(t.score||0)+o.pt;db.history.unshift({name:s.name,result:o.name,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})});let msg=o.msg[Math.floor(Math.random()*o.msg.length)];lastResult=`⚾ ${s.name}が打席に立ちました！\nルーレットの結果は──\n\n【 ${o.name.toUpperCase()}！ 】\n\n${msg}\n${s.name}　＋${o.pt}P\n${t?.name||'未所属'}　＋${o.pt}P`;resultName.textContent=o.name+'！';resultScore.textContent=`＋${o.pt} pt`;totals.textContent=`個人累計：${s.score}pt ／ チーム累計：${t?.score||0}pt`;message.value=lastResult;save()},2200)};
copy.onclick=async()=>{await navigator.clipboard.writeText(message.value);copy.textContent='コピーしました';setTimeout(()=>copy.textContent='結果をコピー',1200)};addStudent.onclick=()=>{let n=studentName.value.trim();if(!n)return alert('生徒名を入力してください');if(db.students.some(s=>s.name===n))return alert('同名の生徒が登録済みです');db.students.push({id:crypto.randomUUID(),name:n,teamId:studentTeam.value,score:0,lastPlayed:''});studentName.value='';save()};window.delStudent=id=>{if(confirm('この生徒を削除しますか？')){db.students=db.students.filter(s=>s.id!==id);save()}};addTeam.onclick=()=>{let n=teamName.value.trim();if(!n)return alert('チーム名を入力してください');db.teams.push({id:crypto.randomUUID(),name:n,logo:placeholder,score:0});teamName.value='';save()};window.renameTeam=(id,n)=>{let t=team(id);if(t){t.name=n.trim()||t.name;save()}};window.logoTeam=(id,file)=>{if(!file)return;let r=new FileReader();r.onload=()=>{team(id).logo=r.result;save()};r.readAsDataURL(file)};window.delTeam=id=>{if(db.students.some(s=>s.teamId===id))return alert('所属生徒がいるため削除できません');if(confirm('このチームを削除しますか？')){db.teams=db.teams.filter(t=>t.id!==id);save()}};resetToday.onclick=()=>{if(confirm('本日の挑戦履歴をリセットしますか？')){db.students.forEach(s=>s.lastPlayed='');save()}};resetAll.onclick=()=>{if(confirm('全データを初期化します。元に戻せません。')){db=seed();save()}};renderAll();
</script></body></html>
